- scope: process
  name: fastqc
  container: "mpgagebioinformatics/fastqc:0.11.9"
  environment: "docker"
  # automated_mount: False
  # docker_run_as_user: True
  # environment_docker:
  #     "-v": ["/nexus:/nexus"]
  parallel: False
  var:
    extra_args: ""
    mk.fastqc_output: "./test/test-output"
    map.f: "./test/test-input/test.fastq.gz"
    cpus: "2"
    read1_sufix: ".fastq.gz"
    map.test: "/nexus"
    # map.fastq_folder: "./test/test-input/"
- scope: hash
  include: ./test/test-output/test_fastqc.html
  overwrite: true
